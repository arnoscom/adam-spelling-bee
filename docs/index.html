<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Spelling Bee</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;text-align:center;padding:20px}
.container{max-width:900px;margin:auto;background:white;padding:20px;border-radius:20px;box-shadow:0 0 10px rgba(0,0,0,.1)}
textarea{width:100%;height:320px;font-size:18px;padding:10px}
button{padding:12px 20px;margin:8px;font-size:20px;border:none;border-radius:10px;cursor:pointer}
.start{background:#007aff;color:white}
.correct{background:#34c759;color:white}
.wrong{background:#ff3b30;color:white}
.speak{background:#5856d6;color:white}
.next{background:#ff9500;color:white}
.pause{background:#444;color:white}
#wordBox{font-size:60px;font-weight:bold;margin:25px;padding:35px;background:#eee;border-radius:20px;letter-spacing:2px;min-height:80px}
#timer{font-size:40px;color:#ff3b30;margin:20px}
.score{font-size:26px;margin-top:20px}
#wrongWords{margin-top:30px;background:#fff0f0;padding:20px;border-radius:15px;text-align:left}
#wrongList{font-size:22px;line-height:1.8}
</style>

</head>
<body>
<div class="container">
<h1>🎤 Adam Spelling Bee</h1>

<textarea id="words">Hexagon
Vegetables
Multiple
Country
Tissue
Exercise
Finally
Graphic
Magazine
Volume
Manufacture
Magnetic
Hundredth
Because
Yesterday
Mosque
Stomach
Pattern
Motion
Money
Survive
Hospital
Liquid
Trouble
Sphere
Cultural
Subtraction
Fragrance
Strange
Manners
Diamond
Success
Luggage
Crowded
Problem
Complain
Calendar
Accident
Bicycle
Educate
Address
Scissors
Supermarket
Squeeze
Choice
Moment
Charcoal
Snuggle
Publisher
Creature
Structure
Capture
Handlebars
Friendship
Grateful
Transport
Election
Perhaps
Advance
Identify</textarea>

<br><br>

<label>Timer per word:</label>
<input type="number" id="timeInput" value="10">

<br><br>

<button class="start" onclick="startGame()">Start Training</button>

<div id="wordBox">Press Start</div>

<div id="timer">⏳ 0</div>

<button class="speak" onclick="speakWord()">🔊 Repeat</button>
<button class="pause" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
<button class="correct" onclick="markCorrect()">✅ Correct</button>
<button class="wrong" onclick="markWrong()">❌ Wrong</button>
<button class="next" onclick="skipWord()">🔁 Skip For Later</button>

<div class="score">
✅ Correct: <span id="correctCount">0</span><br>
❌ Wrong: <span id="wrongCount">0</span><br>
📚 Remaining: <span id="remainingCount">0</span>
</div>

<div id="wrongWords">
<h2>❌ Wrong Words</h2>
<div id="wrongList">No mistakes yet</div>
</div>

</div>

<script>

let words = [];
let remainingWords = [];
let currentWord = "";
let timer;
let timeLeft = 0;
let correct = 0;
let wrong = 0;
let wrongWords = [];
let paused = false;

function startGame(){
words = document.getElementById("words").value
.split("\n")
.map(w => w.trim())
.filter(w => w !== "");

remainingWords = [...words];

correct = 0;
wrong = 0;
wrongWords = [];
paused = false;

document.getElementById("pauseBtn").innerText = "⏸ Pause";

updateScore();
updateWrongList();

nextWord();
}

function nextWord(){
clearInterval(timer);

if(remainingWords.length === 0){
document.getElementById("wordBox").innerText = "🎉 All Words Finished";
document.getElementById("timer").innerText = "";
return;
}

let randomIndex = Math.floor(Math.random() * remainingWords.length);
currentWord = remainingWords[randomIndex];
remainingWords.splice(randomIndex,1);

document.getElementById("wordBox").innerText = currentWord;

updateScore();
speakWord();
startTimer();
}


function skipWord(){
remainingWords.push(currentWord);
nextWord();
}

function speakWord(){
speechSynthesis.cancel();

let utterance = new SpeechSynthesisUtterance(currentWord);
utterance.lang = "en-US";
utterance.rate = 0.85;

speechSynthesis.speak(utterance);
}

function startTimer(){
paused = false;
document.getElementById("pauseBtn").innerText = "⏸ Pause";

timeLeft = parseInt(document.getElementById("timeInput").value);
document.getElementById("timer").innerText = "⏳ " + timeLeft;

timer = setInterval(() => {

if(paused) return;

timeLeft--;
document.getElementById("timer").innerText = "⏳ " + timeLeft;

if(timeLeft <= 0){
clearInterval(timer);

wrong++;
wrongWords.push(currentWord);

updateWrongList();
updateScore();

nextWord();
}

},1000);
}

function togglePause(){

paused = !paused;

if(paused){
document.getElementById("pauseBtn").innerText = "▶ Continue";
}else{
document.getElementById("pauseBtn").innerText = "⏸ Pause";
}
}

function markCorrect(){
correct++;
updateScore();
nextWord();
}

function markWrong(){
wrong++;
wrongWords.push(currentWord);

updateWrongList();
updateScore();

nextWord();
}

function updateScore(){
document.getElementById("correctCount").innerText = correct;
document.getElementById("wrongCount").innerText = wrong;
document.getElementById("remainingCount").innerText = remainingWords.length;
}

function updateWrongList(){
if(wrongWords.length === 0){
document.getElementById("wrongList").innerText = "No mistakes yet";
}else{
document.getElementById("wrongList").innerHTML = wrongWords.join("<br>");
}
}

</script>
</body>
</html>
